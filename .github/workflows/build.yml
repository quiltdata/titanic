name: Build and Validate Deployment Artifacts

on:
  push:
    branches: [main, deploy]
    paths:
      - 'lib/**'
      - 'bin/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main, deploy]
    paths:
      - 'lib/**'
      - 'bin/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version (leave empty for auto-generated)'
        required: false
        type: string

env:
  NODE_VERSION: '18'

jobs:
  build-and-validate:
    name: Build and Validate Artifacts
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Generate version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            COMMIT_SHA=$(git rev-parse --short HEAD)
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSION="build-${TIMESTAMP}-${COMMIT_SHA}"
          elif [[ "${{ github.ref }}" == "refs/heads/deploy" ]]; then
            COMMIT_SHA=$(git rev-parse --short HEAD)
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSION="test-${TIMESTAMP}-${COMMIT_SHA}"
          else
            COMMIT_SHA=$(git rev-parse --short HEAD)
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSION="pr-${{ github.event.number }}-${TIMESTAMP}-${COMMIT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build, test, and package deployment artifacts
        run: npm run deploy:package -- --version "${{ steps.version.outputs.version }}"
      
      - name: Setup Python for YAML validation
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Install PyYAML
        run: pip install PyYAML
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      
      - name: Validate deployment artifacts
        run: ./bin/validate-artifacts.sh --version "${{ steps.version.outputs.version }}"
      
      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts-${{ steps.version.outputs.version }}
          path: artifacts/
          retention-days: ${{ github.event_name == 'release' && 90 || github.event_name == 'push' && 30 || 7 }}
      
      - name: Attach artifacts to release
        if: github.event_name == 'release'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Upload CloudFormation package
          gh release upload "${{ github.event.release.tag_name }}" \
            "artifacts/titanic-cloudformation-${VERSION}.zip" \
            --clobber
          
          # Upload Terraform package
          gh release upload "${{ github.event.release.tag_name }}" \
            "artifacts/titanic-terraform-${VERSION}.zip" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cleanup old artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Keep only the 10 most recent artifact uploads for main branch
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name | startswith("deployment-artifacts-build-")) | .id' \
            | tail -n +11 \
            | xargs -I {} gh api repos/${{ github.repository }}/actions/artifacts/{} -X DELETE || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-and-validate]
    if: always()
    
    steps:
      - name: Generate build summary
        run: |
          echo "## 🚀 Deployment Artifact Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.build-and-validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Validate | ${{ needs.build-and-validate.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.build-and-validate.result }}" == "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Artifacts Available" >> $GITHUB_STEP_SUMMARY
            echo "Download from the [Actions tab](../../actions) or release assets:" >> $GITHUB_STEP_SUMMARY
            echo "- \`titanic-cloudformation-${{ needs.build-and-validate.outputs.version }}.zip\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`titanic-terraform-${{ needs.build-and-validate.outputs.version }}.zip\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🚀 Manual Deployment" >> $GITHUB_STEP_SUMMARY
            echo "1. Download artifacts from above" >> $GITHUB_STEP_SUMMARY
            echo "2. Extract your preferred deployment package" >> $GITHUB_STEP_SUMMARY
            echo "3. Run \`./deploy.sh\` with your AWS credentials" >> $GITHUB_STEP_SUMMARY
            echo "4. See [doc/DEPLOY.md](../doc/DEPLOY.md) for detailed instructions" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please check the build logs and fix any issues." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Note" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts are stored in GitHub. No AWS credentials required for CI/CD." >> $GITHUB_STEP_SUMMARY
