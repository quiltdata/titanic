name: Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Run linter
      run: npm run lint
      
    - name: Build CloudFormation template
      run: npm run deploy:release -- --build-only
      env:
        # Set required environment variables for CDK synthesis
        CDK_DEFAULT_ACCOUNT: "123456789012"  # Placeholder account
        CDK_DEFAULT_REGION: "us-east-1"     # Default region
        QUILT_DATABASE_NAME: "test-database" # Placeholder for synthesis
        QUILT_READ_POLICY_ARN: "arn:aws:iam::123456789012:policy/TestPolicy" # Placeholder
        
    - name: Verify CloudFormation template
      run: |
        if [ ! -f "cdk.out/TitanicStack.template.json" ]; then
          echo "Error: CloudFormation template not found"
          exit 1
        fi
        
        # Verify template has parameters
        if ! grep -q '"Parameters"' cdk.out/TitanicStack.template.json; then
          echo "Error: CloudFormation template missing Parameters section"
          exit 1
        fi
        
        # Check for required parameters
        REQUIRED_PARAMS=("GlueDatabaseName" "QuiltReadPolicyArn" "UseS3Table" "LambdaTimeout")
        for param in "${REQUIRED_PARAMS[@]}"; do
          if ! grep -q "\"$param\"" cdk.out/TitanicStack.template.json; then
            echo "Error: Missing required parameter: $param"
            exit 1
          fi
        done
        
        echo "✅ CloudFormation template validation passed"
        
    - name: Check template size
      run: |
        TEMPLATE_SIZE=$(stat -c%s "cdk.out/TitanicStack.template.json")
        echo "CloudFormation template size: $TEMPLATE_SIZE bytes"
        
        # Warn if template is getting large (CloudFormation limit is 460,800 bytes for direct upload)
        if [ $TEMPLATE_SIZE -gt 400000 ]; then
          echo "⚠️  Warning: Template size is approaching CloudFormation limits"
        fi
        
    - name: Upload CloudFormation template
      uses: actions/upload-artifact@v4
      with:
        name: cloudformation-template-${{ github.sha }}
        path: cdk.out/TitanicStack.template.json
        retention-days: 30
        
    - name: Upload CDK assets info
      uses: actions/upload-artifact@v4
      with:
        name: cdk-assets-${{ github.sha }}
        path: |
          cdk.out/TitanicStack.assets.json
          cdk.out/manifest.json
        retention-days: 30

    # Generate full release package only on main branch pushes
    - name: Generate release package
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        # Extract version from package.json
        VERSION=$(node -p "require('./package.json').version")
        
        # Generate release with version tag
        npm run deploy:release -- --version "v$VERSION" --clean
      env:
        CDK_DEFAULT_ACCOUNT: "123456789012"
        CDK_DEFAULT_REGION: "us-east-1"
        QUILT_DATABASE_NAME: "release-database"
        QUILT_READ_POLICY_ARN: "arn:aws:iam::123456789012:policy/ReleasePolicy"
        
    - name: Create release archive
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        VERSION=$(node -p "require('./package.json').version")
        RELEASE_DIR="release-v$VERSION"
        
        # Create compressed archive
        tar -czf "$RELEASE_DIR.tar.gz" "$RELEASE_DIR/"
        
        # Create zip archive for Windows users
        zip -r "$RELEASE_DIR.zip" "$RELEASE_DIR/"
        
        # Show release package contents
        echo "📦 Release package contents:"
        ls -la "$RELEASE_DIR/"
        
        echo "📊 Archive sizes:"
        ls -lh "$RELEASE_DIR".{tar.gz,zip}
        
    - name: Upload release package
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-package-v${{ github.run_number }}
        path: |
          release-v*.tar.gz
          release-v*.zip
        retention-days: 90
        
    - name: Upload release directory
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-directory-v${{ github.run_number }}
        path: release-v*/
        retention-days: 90

    - name: Build summary
      if: always()
      run: |
        echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tests**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
        echo "- **Linting**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
        echo "- **CloudFormation Template**: ✅ Generated and validated" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
          echo "- **Release Package**: ✅ Generated (main branch push)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Release Package**: ⏭️ Skipped (not main branch push)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- CloudFormation template available as artifact" >> $GITHUB_STEP_SUMMARY
        echo "- CDK assets info available as artifact" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
          echo "- Release package archives available as artifacts" >> $GITHUB_STEP_SUMMARY
        fi
