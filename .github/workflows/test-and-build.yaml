name: Test and Build

on:
  pull_request:
    branches: [ '**' ]  # Run on any PRs
  push:
    branches: [ main ]  # Also run on pushes to main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Run linter
      run: npm run lint
      
    - name: Build CloudFormation template
      run: npm run deploy:release -- --build-only
      env:
        # Set required environment variables for CDK synthesis
        CDK_DEFAULT_ACCOUNT: "123456789012"  # Placeholder account
        CDK_DEFAULT_REGION: "us-east-1"     # Default region
        QUILT_DATABASE_NAME: "test-database" # Placeholder for synthesis
        QUILT_READ_POLICY_ARN: "arn:aws:iam::123456789012:policy/TestPolicy" # Placeholder
        
    - name: Upload CloudFormation template
      uses: actions/upload-artifact@v4
      with:
        name: cloudformation-template-${{ github.sha }}
        path: cdk.out/TitanicStack.template.json
        retention-days: 30
        
    - name: Upload CDK assets info
      uses: actions/upload-artifact@v4
      with:
        name: cdk-assets-${{ github.sha }}
        path: |
          cdk.out/TitanicStack.assets.json
          cdk.out/manifest.json
        retention-days: 30

    # Generate full release package on main or release branch pushes
    - name: Generate release package
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release') && github.event_name == 'push'
      run: |
        # Extract version from package.json
        VERSION=$(node -p "require('./package.json').version")
        
        # Generate release with version tag and archives
        npm run deploy:release -- --version "v$VERSION" --clean --archive
      env:
        CDK_DEFAULT_ACCOUNT: "123456789012"
        CDK_DEFAULT_REGION: "us-east-1"
        QUILT_DATABASE_NAME: "release-database"
        QUILT_READ_POLICY_ARN: "arn:aws:iam::123456789012:policy/ReleasePolicy"
        
    - name: Upload release archives
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release') && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-archives-v${{ github.run_number }}
        path: dist/artifacts/
        retention-days: 90
        
    - name: Upload release directory
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release') && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-directory-v${{ github.run_number }}
        path: dist/release-v*/
        retention-days: 90

    - name: Build summary
      if: always()
      run: |
        echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tests**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
        echo "- **Linting**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
        echo "- **CloudFormation Template**: ✅ Built and validated" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
          echo "- **Release Package**: ✅ Generated (main branch push)" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ github.ref }}" = "refs/heads/release" ] && [ "${{ github.event_name }}" = "push" ]; then
          echo "- **Release Package**: ✅ Generated (release branch push)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Release Package**: ⏭️ Skipped (not main/release branch push)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- CloudFormation template available as artifact" >> $GITHUB_STEP_SUMMARY
        echo "- CDK assets info available as artifact" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
          echo "- Release package archives available as artifacts" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ github.ref }}" = "refs/heads/release" ] && [ "${{ github.event_name }}" = "push" ]; then
          echo "- Release package archives available as artifacts" >> $GITHUB_STEP_SUMMARY
        fi
