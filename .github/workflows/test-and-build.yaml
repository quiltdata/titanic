name: Test and Build

on:
  pull_request:
    branches: [ '**' ]  # Run on any PRs
  push:
    branches: [ main, release ]  # Also run on pushes to main and release
    tags:
      - 'v*'  # Run on version tags

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Run linter
      run: npm run lint

    # Get package version for release naming
    - name: Get package version
      id: package-version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release') && github.event_name == 'push'
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
      
    # Generate release package for main branch (production) or release branch (pre-release)
    - name: Generate release package
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
      run: |
        # Extract version from package.json or use tag
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="v$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == "refs/heads/release" ]]; then
            VERSION="${VERSION}-rc.${GITHUB_RUN_NUMBER}"
          fi
        fi
        
        echo "Building release package version: $VERSION"
        npm run deploy:release -- --version "$VERSION"
      env:
        CDK_DEFAULT_ACCOUNT: "123456789012"
        CDK_DEFAULT_REGION: "us-east-1"
        QUILT_DATABASE_NAME: "release-database"
        QUILT_READ_POLICY_ARN: "arn:aws:iam::123456789012:policy/ReleasePolicy"
        
    - name: Upload release archives
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-archives-${{ github.run_number }}
        path: dist/artifacts/
        retention-days: 90
        
    - name: Upload release directory
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-directory-${{ github.run_number }}
        path: dist/release-*/
        retention-days: 90

    # Create GitHub Release for main branch or tags
    - name: Create GitHub Release
      if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.package-version.outputs.version) }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Release v{0}', steps.package-version.outputs.version) }}
        body: |
          ## Titanic Stack Release
          
          Standalone deployment package for the Titanic Data Lake Table Merger.
          
          ### 📦 Package Contents
          - CloudFormation template with parameterized deployment
          - Deployment script with automatic environment loading
          - Lambda function assets
          - Configuration templates
          
          ### 🚀 Quick Deploy
          1. Download and extract the release archive
          2. Copy `env.example` to `.env` and edit with your values
          3. Run `./deploy.sh`
          
          ### 📋 Requirements
          - AWS CLI configured with deployment permissions
          - `zip` utility for Lambda packaging
          
          Built from commit: ${{ github.sha }}
        files: |
          dist/artifacts/*.tar.gz
          dist/artifacts/*.zip
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Create pre-release for release branch
    - name: Create GitHub Pre-Release
      if: github.ref == 'refs/heads/release' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.package-version.outputs.version }}-rc.${{ github.run_number }}
        name: Pre-Release v${{ steps.package-version.outputs.version }}-rc.${{ github.run_number }}
        body: |
          ## Titanic Stack Pre-Release 🚧
          
          **This is a pre-release version for testing purposes.**
          
          Standalone deployment package for the Titanic Data Lake Table Merger.
          
          ### 📦 Package Contents
          - CloudFormation template with parameterized deployment
          - Deployment script with automatic environment loading  
          - Lambda function assets
          - Configuration templates
          
          ### 🚀 Quick Deploy
          1. Download and extract the release archive
          2. Copy `env.example` to `.env` and edit with your values
          3. Run `./deploy.sh`
          
          ### ⚠️ Pre-Release Notice
          This version is intended for testing and may contain experimental features.
          For production use, please use the latest stable release.
          
          Built from commit: ${{ github.sha }}
        files: |
          dist/artifacts/*.tar.gz
          dist/artifacts/*.zip
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      if: always()
      run: |
        echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tests**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
        echo "- **Linting**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${GITHUB_REF}" == "refs/heads/main" ]] && [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          echo "- **GitHub Release**: ✅ Created (production release)" >> $GITHUB_STEP_SUMMARY
        elif [[ "${GITHUB_REF}" == "refs/heads/release" ]] && [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          echo "- **GitHub Pre-Release**: ✅ Created (testing release)" >> $GITHUB_STEP_SUMMARY
        elif [[ "${GITHUB_REF}" == refs/tags/v* ]] && [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
          echo "- **GitHub Release**: ✅ Created from tag (${GITHUB_REF_NAME})" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Release**: ⏭️ Skipped (PR or non-release branch)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Release Strategy" >> $GITHUB_STEP_SUMMARY
        echo "- **main** branch pushes → Production GitHub Releases" >> $GITHUB_STEP_SUMMARY
        echo "- **release** branch pushes → Pre-release GitHub Releases" >> $GITHUB_STEP_SUMMARY
        echo "- **v*** tags → Production GitHub Releases" >> $GITHUB_STEP_SUMMARY
        echo "- **PRs** → Validation only (no releases)" >> $GITHUB_STEP_SUMMARY
